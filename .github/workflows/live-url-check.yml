name: Live URL Check

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-live-urls:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check production URLs
        shell: bash
        run: |
          set -euo pipefail

          urls=(
            "https://aisearch.global/"
            "https://aisearch.global/about/"
            "https://aisearch.global/faq.html"
            "https://aisearch.global/aeo-score-calculator.html"
            "https://aisearch.global/services/"
            "https://aisearch.global/services/aeo-audit.html"
            "https://aisearch.global/services/content-restructuring.html"
            "https://aisearch.global/services/schema-implementation.html"
            "https://aisearch.global/services/ai-brand-presence.html"
            "https://aisearch.global/services/structured-content-systems.html"
            "https://aisearch.global/services/ai-visibility-strategy.html"
            "https://aisearch.global/insights/"
            "https://aisearch.global/insights/what-is-aeo-answer-engine-optimisation.html"
            "https://aisearch.global/insights/how-ai-decides-which-businesses-to-recommend.html"
            "https://aisearch.global/insights/aeo-traction-stack.html"
            "https://aisearch.global/privacy/"
            "https://aisearch.global/terms/"
            "https://aisearch.global/llms.txt"
            "https://aisearch.global/llms-full.txt"
            "https://aisearch.global/sitemap.xml"
            "https://aisearch.global/robots.txt"
          )

          failed=0
          for url in "${urls[@]}"; do
            code=$(curl -sS -L --max-redirs 10 -o /dev/null -w "%{http_code}" "$url")
            echo "$url -> $code"
            if [[ "$code" != "200" ]]; then
              failed=1
            fi
          done

          if [[ "$failed" -ne 0 ]]; then
            echo "One or more URLs did not return HTTP 200."
            exit 1
          fi
