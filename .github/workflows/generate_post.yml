name: Weekly Blogger Generator

on:
  schedule:
    - cron: '0 12 * * 1'  # Every Monday at 12:00 UTC
  workflow_dispatch:       # Manual trigger via GitHub Actions UI

permissions:
  contents: write  # Required to commit updated topics.json and backups

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: algorithmic-psyche

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and publish blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
          GCP_CLIENT_SECRET: ${{ secrets.GCP_CLIENT_SECRET }}
          GCP_REFRESH_TOKEN: ${{ secrets.GCP_REFRESH_TOKEN }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          PUBLISH: ${{ vars.PUBLISH }}
        run: python generate_post.py

      - name: Commit updated topics queue and backup
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add topics.json backups/
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: pop topic and save backup [skip ci]"
          git push
        working-directory: algorithmic-psyche
